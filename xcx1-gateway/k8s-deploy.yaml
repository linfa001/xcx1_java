apiVersion: apps/v1
kind: Deployment
metadata:
  name: xcx1-gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 允许额外创建1个Pod
      maxUnavailable: 1  # 允许1个Pod不可用（避免死锁）
  selector:
    matchLabels:
      app: xcx1-gateway
  template:
    metadata:
      labels:
        app: xcx1-gateway
    spec:
      containers:
        - name: xcx1-gateway
          image: xcx1-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 80
            initialDelaySeconds: 15  # 应用启动后15秒开始检查
            periodSeconds: 5         # 每5秒检查一次
            timeoutSeconds: 3        # 超时3秒
            failureThreshold: 3      # 连续失败3次才标记为不健康
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 80
            initialDelaySeconds: 40  # 增加到40秒
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: xcx1-gateway-service
spec:
  selector:
    app: xcx1-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP