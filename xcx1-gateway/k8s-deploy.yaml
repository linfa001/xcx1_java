apiVersion: apps/v1
kind: Deployment
metadata:
  name: xcx1-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate  # 先删除旧Pod，再创建新Pod（避免端口冲突）
  selector:
    matchLabels:
      app: xcx1-gateway
  template:
    metadata:
      labels:
        app: xcx1-gateway
    spec:
      hostNetwork: true  # 关键：直接使用宿主机网络
      dnsPolicy: ClusterFirstWithHostNet  # 关键：修复 DNS 解析
      containers:
        - name: xcx1-gateway
          image: xcx1-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: xcx1-gateway-service
spec:
  selector:
    app: xcx1-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: ClusterIP
  # 既然用了 hostNetwork，Service 类型用 ClusterIP 就够了，甚至可以不创建 Service
  # 因为流量不经过 K8s 的转发，直接打到宿主机网卡了