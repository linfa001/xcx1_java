apiVersion: apps/v1
kind: Deployment
metadata:
  name: xcx1-gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: xcx1-gateway
  template:
    metadata:
      labels:
        app: xcx1-gateway
    spec:
      containers:
        - name: xcx1-gateway
          image: xcx1-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: xcx1-gateway-service
spec:
  selector:
    app: xcx1-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
  # 既然用了 hostNetwork，Service 类型用 ClusterIP 就够了，甚至可以不创建 Service
  # 因为流量不经过 K8s 的转发，直接打到宿主机网卡了