server:
  port: 80

spring:
  application:
    name: xcx1-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        # 认证中心路由
        - id: xcx1-auth
          uri: lb://xcx1-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
            
        # 业务系统路由
        - id: system-a
          uri: lb://system-a
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  
  # 默认激活生产环境
  profiles:
    active: prod

# 负载均衡配置
spring.cloud.loadbalancer:
  ribbon:
    enabled: false

# JWT 配置
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForJWTTokensMustBeLongEnough2024}
