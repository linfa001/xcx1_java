server:
  port: 80

spring:
  application:
    name: xcx1-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        # 禁用配置中心，只使用服务发现
      config:
        enabled: false
    gateway:
      # 开启服务发现
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证中心路由 - 简化配置
        - id: xcx1-auth
          uri: lb://xcx1-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
            
        # 业务系统路由
        - id: system-a
          uri: lb://system-a
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# 负载均衡配置
spring.cloud.loadbalancer:
  ribbon:
    enabled: false

# JWT 配置（必须保留，否则 JwtAuthFilter 无法启动）
jwt:
  secret-key: ${JWT_SECRET:defaultSecretKeyForJWTTokensMustBeLongEnough2024}

# 日志配置 - 开启网关调试日志
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    com.alibaba.cloud.nacos: DEBUG
