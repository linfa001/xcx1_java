server:
  port: 80

spring:
  application:
    name: xcx1-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true  # 开启从 Nacos 自动发现服务
          lower-case-service-id: true
      routes:
        # 认证中心路由 (登录接口)
        - id: auth-route
          uri: lb://xcx1-auth
          predicates:
            - Path=/auth/login/**
          filters:
            - AddRequestHeader=X-Gateway-Request, true

        # 业务系统路由 (其他所有接口)
        - id: system-route
          uri: lb://system-a
          predicates:
            - Path=/api/**
          filters:
            - AddRequestHeader=X-Gateway-Request, true

      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# JWT 配置
jwt:
  secret-key: ${JWT_SECRET:defaultSecretKeyForJWTTokensMustBeLongEnough2024}
