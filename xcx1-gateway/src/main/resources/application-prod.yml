# 生产环境配置

# 日志配置 - 生产环境精简日志
logging:
  level:
    root: warn
    org.springframework.cloud.gateway: info
    org.springframework.cloud.loadbalancer: warn
    com.alibaba.cloud.nacos: warn
  charset:
    console: UTF-8
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
