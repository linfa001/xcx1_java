apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-a
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 最多额外创建1个Pod
      maxUnavailable: 0  # 不允许有Pod不可用(保证零停机)
  selector:
    matchLabels:
      app: system-a
  template:
    metadata:
      labels:
        app: system-a
    spec:
      containers:
        - name: system-a
          image: system-a:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
---
apiVersion: v1
kind: Service
metadata:
  name: system-a-service
spec:
  selector:
    app: system-a
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3005
  type: ClusterIP