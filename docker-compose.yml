services:
  # 1. 认证中心 (端口 3005)
  xcx1-auth:
    build:
      context: .
      dockerfile: Dockerfile-auth
    container_name: xcx1-auth
    ports:
      - "3005:3005"
    environment:
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - JWT_SECRET=defaultSecretKeyForJWTTokensMustBeLongEnough2024
    networks:
      - sso-network

  # 2. 业务系统 A (端口 3004)
  system-a:
    build:
      context: .
      dockerfile: Dockerfile-system-a
    container_name: system-a
    ports:
      - "3004:3004"
    environment:
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - SSO_ENABLE_FILTER=true
      - SSO_SECRET_KEY=defaultSecretKeyForJWTTokensMustBeLongEnough2024
    depends_on:
      xcx1-auth:
        condition: service_started
    networks:
      - sso-network

networks:
  sso-network:
    driver: bridge
